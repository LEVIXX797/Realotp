<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EliteSMS | Login</title>
    <link href="https://jsdelivr.net" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="auth-bg">
    <div class="glass-card animate__animated animate__fadeIn">
        <h2 class="fw-bold text-center mb-4">Welcome Back</h2>
        <form id="loginForm">
            <div class="mb-3">
                <label class="form-label">Email Address</label>
                <input type="email" id="email" class="form-control" required placeholder="name@company.com">
            </div>
            <div class="mb-3">
                <label class="form-label">Password</label>
                <input type="password" id="password" class="form-control" required placeholder="••••••••">
            </div>
            <button type="submit" class="btn btn-primary w-100 py-2 fw-bold">Login</button>
        </form>
        <div class="separator my-4"><span>OR</span></div>
        <button id="googleLogin" class="btn btn-outline-light w-100 mb-3">
            <img src="https://icons8.com" class="me-2"> Login with Google
        </button>
        <p class="text-center mt-3 small">New here? <a href="#" class="text-primary">Create Account</a></p>
    </div>
    <script type="module" src="app.js"></script>
</body>
</html>
