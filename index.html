<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EliteSMS | Login</title>
    <link href="https://jsdelivr.net" rel="stylesheet">
    <link rel="stylesheet" href="https://cloudflare.com">
    <link rel="stylesheet" href="style.css">
</head>
<body class="auth-page">
    <div class="glass-container animate__animated animate__zoomIn">
        <div class="text-center mb-4">
            <div class="logo-icon mb-2"><i class="fas fa-shield-alt"></i></div>
            <h2 class="fw-bold">Elite<span>SMS</span></h2>
            <p class="text-muted">Premium OTP Solutions</p>
        </div>
        <form id="loginForm">
            <div class="mb-3">
                <input type="email" id="email" class="form-control premium-input" placeholder="Email Address" required>
            </div>
            <div class="mb-3">
                <input type="password" id="password" class="form-control premium-input" placeholder="Password" required>
            </div>
            <button type="submit" class="btn btn-glow w-100 mb-3">Sign In</button>
        </form>
        <button id="googleLogin" class="btn btn-outline-light w-100 rounded-pill">
            <img src="https://icons8.com" class="me-2"> Google Sign In
        </button>
    </div>
    <script type="module" src="app.js"></script>
</body>
</html>
